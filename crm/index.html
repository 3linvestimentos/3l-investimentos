<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CRM | 3L Investimentos</title><meta name="theme-color" content="#050608"><link rel="stylesheet" href="crm.css"></head><body>
<section id="loginView" class="login-view"><div class="login-card"><img src="../assets/logo-original-transparente.png" alt="3L Investimentos"><p>Gestão de relacionamento e vendas</p><form id="loginForm"><label>Usuário<input id="loginUser" autocomplete="username" required></label><label>Senha<input id="loginPass" type="password" autocomplete="current-password" required></label><button>Entrar no CRM</button><small id="loginMsg"></small></form><a href="../">← Voltar ao site</a></div></section>
<div id="appView" class="app hidden"><aside><img src="../assets/logo-original-transparente.png" alt="3L"><nav><button class="active" data-section="leads">▦ Leads</button><button data-section="agenda">◷ Agenda</button><button data-section="relatorios">↗ Relatórios</button></nav><button id="logoutBtn" class="logout">Sair</button></aside><main><header><div><span>CRM 3L INVESTIMENTOS</span><h1>Painel comercial</h1></div><button id="newLeadBtn" class="gold-btn">+ Novo lead</button></header>
<section id="leadsSection"><div class="metrics"><article><span>Novos</span><b id="mNovos">0</b></article><article><span>Em andamento</span><b id="mAndamento">0</b></article><article><span>Vendas</span><b id="mVendas">0</b></article><article><span>Conversão</span><b id="mConversao">0%</b></article></div><div class="toolbar"><input id="searchInput" placeholder="Pesquisar por nome, telefone ou cidade"><select id="statusFilter"><option value="">Todos os status</option><option>Novo lead</option><option>Primeiro contato</option><option>Simulação enviada</option><option>Em negociação</option><option>Documentação</option><option>Venda fechada</option><option>Perdido</option></select><button id="exportBtn">Exportar CSV</button></div><div id="leadList" class="lead-list"></div></section>
<section id="agendaSection" class="hidden"><div class="panel"><h2>Próximos contatos</h2><div id="agendaList"></div></div></section>
<section id="relatoriosSection" class="hidden"><div class="panel"><h2>Resumo do funil</h2><div id="reportList" class="report-list"></div></div></section>
</main></div>
<dialog id="leadDialog"><form id="leadForm" method="dialog"><div class="modal-head"><h2 id="dialogTitle">Novo lead</h2><button type="button" id="closeDialog">×</button></div><input type="hidden" id="leadId"><div class="form-grid"><label>Nome<input id="fNome" required></label><label>WhatsApp<input id="fTelefone" required></label><label>E-mail<input id="fEmail" type="email"></label><label>Cidade/UF<input id="fCidade"></label><label>Tipo<select id="fTipo"><option>Imóvel</option><option>Veículo</option><option>Investimentos</option><option>Construção</option><option>Capital de giro</option><option>Flex</option></select></label><label>Valor desejado<input id="fValor"></label><label>Parcela ideal<input id="fParcela"></label><label>Status<select id="fStatus"><option>Novo lead</option><option>Primeiro contato</option><option>Simulação enviada</option><option>Em negociação</option><option>Documentação</option><option>Venda fechada</option><option>Perdido</option></select></label><label>Próximo contato<input id="fProximo" type="date"></label><label class="wide">Observações<textarea id="fObs"></textarea></label></div><div class="modal-actions"><button type="button" id="deleteBtn" class="danger hidden">Excluir</button><button type="submit" class="gold-btn">Salvar lead</button></div></form></dialog>
<script src="crm.js"></script></body></html>
